<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Dice Roller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: "Tormenta";
            src: url("../poderes/assets/fonts/Tormenta.ttf") format("truetype");
        }
        :root {
            --bg: #06070c;
            --surface: #0b0e1a;
            --card: rgba(18, 23, 38, 0.72);
            --card-border: rgba(201, 147, 58, 0.2);
            --gold: #c9933a;
            --gold-light: #e8bc60;
            --gold-dim: #7a5820;
            --parchment: #e2d8c3;
            --parchment-dim: #8e7d65;
            --glow: rgba(200, 150, 50, 0.22);
            --text: #e2d8c3;
            --muted: #8e7d65;
            --radius: 16px;
        }



        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 20%, rgba(80,60,160,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(180,80,20,0.04) 0%, transparent 70%);
        }

        #stars-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        #particles-container { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
        .particle { position: absolute; border-radius: 50%; pointer-events: none; transition: transform 0.8s ease-out, opacity 0.8s ease-out; }

        /* ── SCREEN EFFECT OVERLAYS ── */
        #screen-effect-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0;
            transition: opacity 0.15s ease-out;
        }
        #screen-effect-overlay.flash-success {
            background: radial-gradient(circle, rgba(232, 188, 96, 0.45) 0%, rgba(200, 150, 50, 0.15) 100%);
            opacity: 1;
            animation: fadeOutEffect 0.8s ease-out forwards;
        }
        #screen-effect-overlay.flash-fumble {
            background: radial-gradient(circle, rgba(200, 30, 30, 0.5) 0%, rgba(100, 10, 10, 0.25) 100%);
            opacity: 1;
            animation: fadeOutEffect 1.2s ease-out forwards;
        }
        @keyframes fadeOutEffect {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        body.shake-screen {
            animation: screenShake 0.4s ease-in-out;
        }
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-4px, 2px) rotate(-1deg); }
            20%, 40%, 60%, 80% { transform: translate(4px, -2px) rotate(1deg); }
        }

        /* ── HEADER ── */
        header {
            position: relative; z-index: 10;
            width: 100%; max-width: 520px;
            padding: 22px 20px 10px;
            display: flex; align-items: center;
        }
        .app-title {
            flex: 1; text-align: center;
            font-family: "Tormenta", 'Cinzel Decorative', serif; font-size: 1.1rem;
            color: var(--gold); letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 20px var(--glow);
        }
        .header-buttons { display: flex; gap: 6px; margin-left: auto; }
        .icon-btn {
            background: rgba(200,150,50,0.07); border: 1px solid rgba(200,150,50,0.18);
            color: var(--parchment-dim); width: 38px; height: 38px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 1.1rem;
        }
        .icon-btn:hover { background: rgba(200,150,50,0.16); color: var(--gold); border-color: rgba(200,150,50,0.45); box-shadow: 0 0 10px rgba(200,150,50,0.25); }

        /* Ornament divider */
        .ornament {
            position: relative; z-index: 10; width: 100%; max-width: 440px;
            display: flex; align-items: center; gap: 10px; padding: 0 20px;
        }
        .ornament::before, .ornament::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
        }
        .ornament-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 8px var(--glow); }

        /* ── MAIN ── */
        main {
            position: relative; z-index: 10; flex: 1;
            width: 100%; max-width: 480px;
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 20px; gap: 22px;
        }

        /* ── DICE ARENA ── */
        #dice-arena { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 16px 0 8px; }

        #die-svg-wrapper {
            position: relative; width: 230px; height: 230px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Runic ring background */
        #runic-ring-container {
            position: absolute;
            width: 230px; height: 230px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            z-index: 1;
        }
        #runic-ring {
            width: 100%; height: 100%;
            animation: rotateRunicRing 45s linear infinite;
            filter: drop-shadow(0 0 6px rgba(200, 150, 50, 0.2));
            transition: filter 0.3s, transform 0.3s;
        }
        @keyframes rotateRunicRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #die-svg-wrapper.rolling #runic-ring {
            animation: rotateRunicRingFast 2.2s linear infinite;
            filter: drop-shadow(0 0 16px rgba(200, 150, 50, 0.55));
        }
        @keyframes rotateRunicRingFast {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #die-svg-wrapper.crit #runic-ring {
            filter: drop-shadow(0 0 22px rgba(255, 200, 50, 0.85));
            transform: scale(1.05);
        }
        #die-svg-wrapper.fumble #runic-ring {
            filter: drop-shadow(0 0 22px rgba(220, 30, 30, 0.85));
            transform: scale(0.95);
        }

        #die-glow {
            position: absolute; inset: -15px; border-radius: 50%;
            background: radial-gradient(circle, rgba(200,150,50,0.25) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
            z-index: 2;
        }
        #die-svg-wrapper.rolling #die-glow { opacity: 1; animation: glowBreathe 0.35s infinite alternate; }
        #die-svg-wrapper.crit #die-glow { opacity: 1; background: radial-gradient(circle, rgba(255,200,60,0.45) 0%, transparent 70%); }
        #die-svg-wrapper.fumble #die-glow { opacity: 1; background: radial-gradient(circle, rgba(220,30,30,0.45) 0%, transparent 70%); }
        @keyframes glowBreathe { from { transform: scale(0.88); opacity: 0.5; } to { transform: scale(1.12); opacity: 0.95; } }

        #die-svg { width: 170px; height: 170px; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7)); overflow: visible; z-index: 3; }
        #die-svg.rolling { animation: spinRoll 0.28s linear infinite; }
        @keyframes spinRoll {
            0%   { transform: rotate(0deg) scale(1); }
            33%  { transform: rotate(120deg) scale(1.06); }
            66%  { transform: rotate(240deg) scale(0.95); }
            100% { transform: rotate(360deg) scale(1); }
        }
        #die-svg.settle { animation: diceSettle 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        @keyframes diceSettle { 0% { transform: rotate(-18deg) scale(1.18); } 60% { transform: rotate(5deg) scale(0.96); } 100% { transform: rotate(0deg) scale(1); } }
        #die-svg-wrapper.crit #die-svg { animation: critFlash 0.55s ease forwards; }
        #die-svg-wrapper.fumble #die-svg { animation: fumbleFlash 0.55s ease forwards; }
        @keyframes critFlash { 0% { filter: drop-shadow(0 0 0 rgba(255,220,60,0)); } 40% { filter: drop-shadow(0 0 35px rgba(255,220,60,1)); } 100% { filter: drop-shadow(0 0 15px rgba(255,200,50,0.45)); } }
        @keyframes fumbleFlash { 0% { filter: drop-shadow(0 0 0 rgba(220,30,30,0)); } 40% { filter: drop-shadow(0 0 35px rgba(220,30,30,1)); } 100% { filter: drop-shadow(0 0 15px rgba(200,20,20,0.45)); } }

        #expression-display { font-family: 'Cinzel', serif; font-size: 1.05rem; color: var(--parchment-dim); letter-spacing: 3px; }
        
        .crit-label {
            font-family: 'Cinzel Decorative', serif; font-size: 0.85rem;
            letter-spacing: 4px; text-transform: uppercase;
            opacity: 0; height: 0; overflow: hidden;
            transition: opacity 0.4s, height 0.3s;
            z-index: 10;
        }
        .crit-label.show { opacity: 1; height: 22px; }
        .crit-label.success { color: var(--gold-light); text-shadow: 0 0 12px var(--gold); }
        .crit-label.fumble { color: #ff5f5f; text-shadow: 0 0 12px #dd2222; }

        /* ── QUICK MODIFIERS ── */
        .quick-modifiers {
            display: flex; gap: 8px; margin-top: -6px; margin-bottom: 4px; z-index: 10;
        }
        .mod-btn {
            background: rgba(200, 150, 50, 0.08); border: 1px solid rgba(201, 147, 58, 0.22);
            color: var(--parchment-dim); font-family: 'Cinzel', serif; font-size: 0.72rem;
            font-weight: 600; padding: 4px 10px; border-radius: 6px; cursor: pointer;
            transition: all 0.15s;
        }
        .mod-btn:hover {
            background: rgba(201, 147, 58, 0.18); color: var(--gold-light); border-color: var(--gold);
            box-shadow: 0 0 8px rgba(201, 147, 58, 0.2);
        }
        .mod-btn:active { transform: scale(0.92); }

        /* ── RESULT ── */
        #result-container {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--card-border); border-radius: var(--radius); padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(200,150,50,0.08);
            display: flex; flex-direction: column; gap: 12px;
            opacity: 0; transform: translateY(14px) scale(0.98);
            transition: all 0.4s cubic-bezier(0.34,1.2,0.64,1); pointer-events: none;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        #result-container.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        .result-group { padding-bottom: 12px; border-bottom: 1px solid rgba(200,150,50,0.1); }
        .result-group:last-child { border-bottom: none; padding-bottom: 0; }
        .group-title { font-family: 'Cinzel', serif; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 4px; }
        .group-total { font-family: 'Cinzel', serif; font-size: 2.6rem; font-weight: 700; color: var(--gold-light); text-shadow: 0 0 20px rgba(230,180,80,0.35); line-height: 1; }
        .group-details { font-size: 0.85rem; color: var(--muted); font-style: italic; margin-top: 4px; }
        .rolls-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        
        .roll-chip { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: rgba(200,150,50,0.1); border: 1px solid rgba(200,150,50,0.2); color: var(--parchment-dim); }
        .roll-chip.max { background: rgba(200,150,50,0.22); border-color: var(--gold); color: var(--gold-light); }
        .roll-chip.min { background: rgba(180,40,40,0.25); border-color: rgba(220,60,60,0.4); color: #ffa0a0; }
        
        .roll-chip.discarded {
            text-decoration: line-through;
            opacity: 0.4;
            background: rgba(255,255,255,0.02);
            border-color: rgba(255,255,255,0.06);
            color: var(--muted);
        }

        /* ── ADVANTAGE SELECTOR ── */
        .advantage-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 3px;
            width: 85%;
            max-width: 320px;
            margin-top: 10px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .adv-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 7px 10px;
            border-radius: 17px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            text-align: center;
        }
        .adv-btn.active {
            background: linear-gradient(180deg, #ecc060 0%, #c9933a 100%);
            color: #180e00;
            box-shadow: 0 2px 8px rgba(200, 150, 50, 0.35);
        }
        .adv-btn:hover:not(.active) {
            color: var(--gold-light);
        }

        /* ── ROLL BUTTON ── */
        #roll-button {
            font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase; color: #180e00;
            background: linear-gradient(180deg, #ecc060 0%, #c9933a 50%, #9a6818 100%);
            border: none; padding: 17px 40px; border-radius: 50px;
            cursor: pointer; width: 85%; max-width: 320px;
            box-shadow: 0 6px 20px rgba(170,110,20,0.35), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -2px 4px rgba(0,0,0,0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden;
            z-index: 10;
        }
        #roll-button::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 55%); border-radius: 50px; }
        #roll-button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(170,110,20,0.5), 0 0 12px rgba(232, 188, 96, 0.3); }
        #roll-button:active { transform: scale(0.95) translateY(1px); box-shadow: 0 3px 10px rgba(170,110,20,0.3), inset 0 2px 4px rgba(0,0,0,0.2); }
        #roll-button:disabled { opacity: 0.65; cursor: not-allowed; transform: none; box-shadow: none; }

        .shake-hint { font-size: 0.82rem; color: var(--muted); display: flex; align-items: center; gap: 7px; font-style: italic; z-index: 10; }

        /* ── QUICK ROLLS ── */
        #quick-rolls { width: 100%; display: flex; flex-direction: column; gap: 10px; z-index: 10; }

        .qr-header {
            display: flex; align-items: center; gap: 10px;
        }
        .qr-title { font-family: 'Cinzel', serif; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; flex: 1; }

        .btn-add-folder {
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(200,150,50,0.1); border: 1px solid rgba(200,150,50,0.3);
            color: var(--gold); cursor: pointer; font-size: 1.1rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .btn-add-folder:hover { background: rgba(200,150,50,0.22); border-color: var(--gold); box-shadow: 0 0 8px rgba(200,150,50,0.35); }

        /* Folder card */
        .folder-card {
            background: var(--card);
            border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .folder-card:hover {
            border-color: rgba(201, 147, 58, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .folder-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px; user-select: none; cursor: pointer;
        }
        .folder-chevron {
            color: var(--gold-dim); font-size: 0.65rem; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: transform 0.22s; background: none; border: none; cursor: pointer;
        }
        .folder-card.open .folder-chevron { transform: rotate(90deg); color: var(--gold); }

        .folder-name {
            font-family: 'Cinzel', serif; font-size: 0.86rem; color: var(--parchment);
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .btn-folder-add {
            width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
            background: none; border: 1px solid rgba(200,150,50,0.2);
            color: var(--gold-dim); cursor: pointer; font-size: 1rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .btn-folder-add:hover { border-color: var(--gold); color: var(--gold); background: rgba(200,150,50,0.1); box-shadow: 0 0 6px rgba(200,150,50,0.3); }
        .btn-folder-del {
            width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
            background: none; border: none; color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
            transition: all 0.2s; opacity: 0.55;
        }
        .btn-folder-del:hover { color: #d07070; background: rgba(180,30,30,0.15); opacity: 1; }

        /* Folder body */
        .folder-body { display: none; padding: 0 12px 12px; }
        .folder-card.open .folder-body { display: block; }
        .folder-rolls { display: flex; flex-wrap: wrap; gap: 8px; min-height: 28px; }
        .folder-empty { font-size: 0.8rem; color: var(--muted); font-style: italic; padding: 2px 0; }

        /* Saved roll chip */
        .saved-roll-wrap { position: relative; display: inline-flex; }
        .saved-roll-btn {
            font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 600;
            padding: 6px 12px; border-radius: 20px;
            cursor: pointer; transition: all 0.2s;
            max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid transparent;
        }
        .saved-roll-btn:active { transform: scale(0.92); }
        
        /* Saved rolls color styles */
        .saved-roll-btn.color-gold {
            background: rgba(200, 150, 50, 0.08); border-color: rgba(200, 150, 50, 0.22); color: #e8d5b0;
        }
        .saved-roll-btn.color-gold:hover {
            background: rgba(200, 150, 50, 0.18); border-color: #c9933a; color: #e8bc60; box-shadow: 0 0 10px rgba(200, 150, 50, 0.35);
        }

        .saved-roll-btn.color-red {
            background: rgba(226, 62, 62, 0.08); border-color: rgba(226, 62, 62, 0.22); color: #fecaca;
        }
        .saved-roll-btn.color-red:hover {
            background: rgba(226, 62, 62, 0.18); border-color: #e23e3e; color: #fca5a5; box-shadow: 0 0 10px rgba(226, 62, 62, 0.35);
        }

        .saved-roll-btn.color-blue {
            background: rgba(59, 130, 246, 0.08); border-color: rgba(59, 130, 246, 0.22); color: #dbeafe;
        }
        .saved-roll-btn.color-blue:hover {
            background: rgba(59, 130, 246, 0.18); border-color: #3b82f6; color: #93c5fd; box-shadow: 0 0 10px rgba(59, 130, 246, 0.35);
        }

        .saved-roll-btn.color-green {
            background: rgba(16, 185, 129, 0.08); border-color: rgba(16, 185, 129, 0.22); color: #d1fae5;
        }
        .saved-roll-btn.color-green:hover {
            background: rgba(16, 185, 129, 0.18); border-color: #10b981; color: #6ee7b7; box-shadow: 0 0 10px rgba(16, 185, 129, 0.35);
        }

        .saved-roll-btn.color-purple {
            background: rgba(168, 85, 247, 0.08); border-color: rgba(168, 85, 247, 0.22); color: #f3e8ff;
        }
        .saved-roll-btn.color-purple:hover {
            background: rgba(168, 85, 247, 0.18); border-color: #a855f7; color: #d8b4fe; box-shadow: 0 0 10px rgba(168, 85, 247, 0.35);
        }

        .saved-roll-btn.color-gray {
            background: rgba(107, 114, 128, 0.08); border-color: rgba(107, 114, 128, 0.22); color: #f3f4f6;
        }
        .saved-roll-btn.color-gray:hover {
            background: rgba(107, 114, 128, 0.18); border-color: #6b7280; color: #d1d5db; box-shadow: 0 0 10px rgba(107, 114, 128, 0.35);
        }

        .saved-roll-del {
            position: absolute; right: -7px; top: -7px;
            width: 17px; height: 17px; border-radius: 50%;
            background: rgba(120,20,20,0.95); color: rgba(255,160,160,0.9);
            font-size: 10px; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.25; transition: opacity 0.2s; pointer-events: auto; z-index: 2;
            line-height: 1;
        }
        .saved-roll-wrap:hover .saved-roll-del { opacity: 1; }

        /* ── MODALS (shared) ── */
        .modal {
            position: fixed; inset: 0; background: rgba(5,7,16,0.85); backdrop-filter: blur(5px);
            display: flex; align-items: flex-end; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: linear-gradient(180deg, #181d2f 0%, #0d101a 100%);
            border: 1px solid rgba(200,150,50,0.28); border-bottom: none;
            border-radius: 22px 22px 0 0; width: 100%; max-width: 600px;
            padding: 20px 22px 40px; max-height: 88vh; overflow-y: auto;
            display: flex; flex-direction: column; gap: 18px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34,1.1,0.64,1);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.65);
        }
        .modal.active .modal-content { transform: translateY(0); }
        .modal-handle { width: 36px; height: 4px; background: rgba(200,150,50,0.28); border-radius: 2px; margin: 0 auto -4px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }

        label { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

        input[type="text"] {
            background: rgba(0,0,0,0.45); border: 1px solid rgba(200,150,50,0.28);
            color: var(--parchment); padding: 13px 16px; font-size: 1.1rem;
            font-family: 'EB Garamond', serif; border-radius: 10px; width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 14px rgba(200,150,50,0.25); }

        .dice-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
        .dice-btn {
            background: rgba(200,150,50,0.07); border: 1px solid rgba(200,150,50,0.18);
            color: var(--parchment); padding: 11px 4px; border-radius: 8px;
            cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 600;
            transition: all 0.15s;
        }
        .dice-btn:hover { background: rgba(200,150,50,0.17); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 6px rgba(200,150,50,0.2); }
        .dice-btn:active { transform: scale(0.93); }
        .dice-btn.special { background: rgba(120,30,30,0.12); border-color: rgba(150,50,50,0.28); color: var(--parchment-dim); }
        .dice-btn.special:hover { background: rgba(150,40,40,0.28); border-color: #8b3333; color: #d08080; }

        /* Color picker in roll modal */
        .color-picker-grid { display: flex; gap: 10px; margin-top: 2px; }
        .color-picker-btn {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            background-color: var(--btn-color);
            cursor: pointer; transition: all 0.15s;
            position: relative;
        }
        .color-picker-btn:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.4); box-shadow: 0 0 10px var(--btn-glow); }
        .color-picker-btn.active { border-color: #ffffff; box-shadow: 0 0 12px var(--btn-glow); transform: scale(1.15); }

        .modal-footer { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 13px; border-radius: 10px; border: none; font-family: 'Cinzel', serif; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
        .btn-save { background: linear-gradient(180deg, #c9933a, #8a5c15); color: #180e00; box-shadow: 0 4px 12px rgba(170,110,20,0.3); }
        .btn-save:hover { box-shadow: 0 4px 18px rgba(170,110,20,0.5); }
        .btn-cancel { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.09); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); color: var(--text); }

        /* ── LOG ── */
        #log-container { width: 100%; max-width: 480px; padding: 0 20px 32px; position: relative; z-index: 10; display: none; }
        #log-container.active { display: block; }
        .log-card {
            background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 18px;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .log-header h3 { font-family: 'Cinzel', serif; font-size: 0.78rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2.5px; }
        .log-list { display: flex; flex-direction: column; gap: 7px; max-height: 260px; overflow-y: auto; }
        .log-item { background: rgba(0,0,0,0.22); padding: 9px 12px; border-radius: 8px; font-size: 0.83rem; border-left: 2px solid rgba(200,150,50,0.25); }
        .log-time { color: var(--muted); font-size: 0.7rem; margin-bottom: 2px; font-style: italic; }
        .log-expr { font-family: 'Cinzel', serif; font-size: 0.82rem; color: var(--gold-light); margin-bottom: 1px; }

        /* Permission overlay */
        #permission-overlay {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(180deg, #ecc060, #c9933a); color: #180e00;
            padding: 13px 26px; border-radius: 50px; font-family: 'Cinzel', serif;
            font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; z-index: 2000;
            box-shadow: 0 6px 22px rgba(170,110,20,0.5); cursor: pointer; display: none; white-space: nowrap;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(200,150,50,0.25); border-radius: 10px; }

        @media (max-width: 400px) {
            .dice-grid { grid-template-columns: repeat(4, 1fr); }
            #die-svg { width: 145px; height: 145px; }
            #die-svg-wrapper { width: 190px; height: 190px; }
            #runic-ring-container { width: 190px; height: 190px; }
        }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="particles-container"></div>

<header>
    <div class="app-title">Dice Roller</div>
    <div class="header-buttons">
        <a href="../index.html" class="icon-btn" title="Arsenal do Mestre" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-size:1.1rem;">🏠</a>
        <button class="icon-btn" id="btn-log" title="Histórico">

                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>

</header>

<div class="ornament"><div class="ornament-diamond"></div></div>

<main>
    <!-- Dice Arena -->
    <div id="dice-arena">
        <div id="die-svg-wrapper">
            <div id="die-glow"></div>
            <!-- Runic Ring Frame -->
            <div id="runic-ring-container">
                <svg id="runic-ring" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="130" cy="130" r="120" fill="none" stroke="rgba(201, 147, 58, 0.2)" stroke-width="1.2" />
                    <circle cx="130" cy="130" r="113" fill="none" stroke="rgba(201, 147, 58, 0.35)" stroke-width="1.8" stroke-dasharray="10 7" />
                    <circle cx="130" cy="130" r="102" fill="none" stroke="rgba(201, 147, 58, 0.15)" stroke-width="1" />
                    <g fill="rgba(201, 147, 58, 0.65)">
                        <!-- Diamonds / Runes representation -->
                        <path d="M 130 6 L 133 9 L 130 12 L 127 9 Z" />
                        <path d="M 130 248 L 133 251 L 130 254 L 127 251 Z" />
                        <path d="M 6 130 L 9 133 L 12 130 L 9 127 Z" />
                        <path d="M 248 130 L 251 133 L 254 130 L 251 127 Z" />
                        
                        <!-- Diagonal markers -->
                        <path d="M 44 44 L 48 48" stroke="rgba(201, 147, 58, 0.6)" stroke-width="1.5"/>

                        <path d="M 44 216 L 48 212" stroke="rgba(201, 147, 58, 0.6)" stroke-width="1.5"/>
                        <path d="M 216 216 L 212 212" stroke="rgba(201, 147, 58, 0.6)" stroke-width="1.5"/>
                    </g>
                </svg>
            </div>
            <!-- Main Die shape -->
            <svg id="die-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" overflow="visible">
                <defs>
                    <linearGradient id="dieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#3a2c16"/>
                        <stop offset="60%" style="stop-color:#1c1307"/>
                        <stop offset="100%" style="stop-color:#0d0802"/>
                    </linearGradient>
                    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffe494"/>
                        <stop offset="50%" style="stop-color:#c9933a"/>
                        <stop offset="100%" style="stop-color:#70501a"/>
                    </linearGradient>
                    <!-- Facet Gradients for 3D depth with rich black-gold style -->
                    <linearGradient id="facGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4a371c"/>
                        <stop offset="100%" style="stop-color:#1e1408"/>
                    </linearGradient>
                    <linearGradient id="facGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#322411"/>
                        <stop offset="100%" style="stop-color:#140e05"/>
                    </linearGradient>
                    <linearGradient id="facGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#201509"/>
                        <stop offset="100%" style="stop-color:#0a0602"/>
                    </linearGradient>
                    <filter id="numGlow" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
                        <feFlood flood-color="#e8bc60" flood-opacity="0.8" result="color"/>
                        <feComposite in="color" in2="blur" operator="in" result="glow"/>
                        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <!-- D4 3D Faceted -->
                <g id="shape-d4" style="display:none">
                    <polygon points="100,15 15,165 100,115" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.5"/>
                    <polygon points="100,15 185,165 100,115" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.5"/>
                    <polygon points="15,165 185,165 100,115" fill="url(#facGrad1)" stroke="url(#edgeGrad)" stroke-width="1.5"/>
                </g>
                <g id="inner-d4" style="display:none"></g>

                <!-- D6 3D Tilted Cube -->

                    <polygon points="40,40 65,15 185,15 160,40" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.5"/>
                    <polygon points="160,40 185,15 185,135 160,160" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.5"/>

                    <polygon points="100,185 15,100 100,100" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.5"/>
                    <polygon points="100,185 185,100 100,100" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.5"/>
                </g>
                <g id="inner-d8" style="display:none"></g>

                <!-- D10 3D Pentagonal Trapezohedron -->
                <g id="shape-d10" style="display:none">
                    <polygon points="100,15 20,85 100,105" fill="url(#facGrad1)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,15 180,85 100,105" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="20,85 45,145 100,105" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>

                </g>
                <g id="inner-d10" style="display:none"></g>

                <!-- D12 3D Dodecahedron -->
                <g id="shape-d12" style="display:none">
                    <polygon points="57,86 100,55 138,47 100,15 62,47" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>

                <g id="shape-d20" style="display:none">
                    <polygon points="100,10 100,60 22,55" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,10 178,55 100,60" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="178,55 143,135 100,60" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="178,55 178,145 143,135" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="178,145 100,190 143,135" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,190 57,135 143,135" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,190 22,145 57,135" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="22,145 22,55 57,135" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="22,55 100,60 57,135" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,60 143,135 57,135" fill="url(#facGrad1)" stroke="url(#edgeGrad)" stroke-width="1.5"/>
                </g>
                <g id="inner-d20" style="display:none"></g>

                <!-- D100 3D Decagonal Gem Sphere -->
                <g id="shape-d100" style="display:none">
                    <polygon points="100,15 150,31 138,47 100,35" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="150,31 181,74 162,80 138,47" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="181,74 181,126 162,120 162,80" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="181,126 150,169 138,153 162,120" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="150,169 100,185 100,165 138,153" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,185 50,169 62,153 100,165" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="50,169 19,126 38,120 62,153" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="19,126 19,74 38,80 38,120" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="19,74 50,31 62,47 38,80" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>

                    <polygon points="178,55 143,135 100,60" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="178,55 178,145 143,135" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="178,145 100,190 143,135" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,190 57,135 143,135" fill="url(#facGrad3)" stroke="url(#edgeGrad)" stroke-width="1.2"/>
                    <polygon points="100,190 22,145 57,135" fill="url(#facGrad2)" stroke="url(#edgeGrad)" stroke-width="1.2"/>

    <!-- Advantage / Disadvantage Selector -->

        <button class="adv-btn active" id="adv-normal" data-mode="normal">Normal</button>

                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
                </svg>
            </button>
        </div>
        <div id="folders-container"></div>
    </div>
</main>

<!-- Log -->
<div id="log-container">
    <div class="log-card">
        <div class="log-header">
            <h3>Histórico</h3>
            <button class="btn btn-cancel" id="btn-clear-log" style="padding:5px 14px;font-size:0.72rem;flex:none;border-radius:6px;">Limpar</button>
        </div>
        <div class="log-list" id="log-list"></div>
    </div>
</div>

<!-- ── MODAL: Settings ── -->
<div class="modal" id="settings-modal">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <h2>Configuração</h2>
            <button class="icon-btn" id="btn-close-settings" style="width:32px;height:32px;font-size:1.3rem;">&times;</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
            <label for="expression-input">Expressão de Dados</label>
            <input type="text" id="expression-input" placeholder="Ex: 1d20+5 | 2d6">
            <p style="font-size:0.8rem;color:var(--muted);font-style:italic;">Use | para separar grupos.</p>
        </div>
        <div class="dice-grid">
            <button class="dice-btn" data-val="d2">d2</button>
            <button class="dice-btn" data-val="d3">d3</button>
            <button class="dice-btn" data-val="d4">d4</button>
            <button class="dice-btn" data-val="d6">d6</button>
            <button class="dice-btn" data-val="d8">d8</button>

<div id="permission-overlay">✦ Ativar Shake &amp; Áudio ✦</div>

<script>
// =============================================================
//  RPG DICE ROLLER — with Quick Rolls / Folders
// =============================================================

// ── State ──────────────────────────────────────────────────
const state = {
    expression: '1d20+5',
    rollLabel: '',
    rollMode: 'normal', // 'normal', 'adv', 'dis'
    history: JSON.parse(localStorage.getItem('dice_history') || '[]'),
    folders: JSON.parse(localStorage.getItem('dice_folders') || '[]'),
    activeFolderId: null,
    isRolling: false,
    audioEnabled: false,
    audioCtx: null
};

let newRollExpr = '';
let selectedRollColor = 'gold';

// ── Elements ───────────────────────────────────────────────
const el = {
    dieSvg:          document.getElementById('die-svg'),
    dieWrapper:      document.getElementById('die-svg-wrapper'),
    dieNumber:       document.getElementById('die-number'),
    dieLabel:        document.getElementById('die-label'),
    rollLabel:       document.getElementById('roll-label'),
    exprDisplay:     document.getElementById('expression-display'),
    resultContainer: document.getElementById('result-container'),
    rollButton:      document.getElementById('roll-button'),
    settingsModal:   document.getElementById('settings-modal'),
    exprInput:       document.getElementById('expression-input'),
    logContainer:    document.getElementById('log-container'),
    logList:         document.getElementById('log-list'),
    permOverlay:     document.getElementById('permission-overlay'),
    critLabel:       document.getElementById('crit-label'),
    particles:       document.getElementById('particles-container'),
    foldersContainer:document.getElementById('folders-container'),
    newFolderModal:  document.getElementById('new-folder-modal'),
    folderNameInput: document.getElementById('folder-name-input'),
    newRollModal:    document.getElementById('new-roll-modal'),
    rollNameInput:   document.getElementById('roll-name-input'),
    newRollExprDisp: document.getElementById('new-roll-expr-display')
};

// ── Die shape config ───────────────────────────────────────
const DIE_CONFIG = {
    d4:    { shapes:['d4','inner-d4'],     numY:118, labelY:158, fs:50 },
    d6:    { shapes:['d6','inner-d6'],     numY:100, labelY:158, fs:62 },
    d8:    { shapes:['d8','inner-d8'],     numY:100, labelY:158, fs:60 },
    d10:   { shapes:['d10','inner-d10'],   numY:108, labelY:162, fs:56 },
    d12:   { shapes:['d12','inner-d12'],   numY:105, labelY:160, fs:56 },
    d20:   { shapes:['d20','inner-d20'],   numY:112, labelY:150, fs:52 },
    d100:  { shapes:['d100','inner-d100'], numY:100, labelY:155, fs:42 },
    default:{ shapes:['default'],          numY:112, labelY:150, fs:52 }
};
const ALL_SHAPES = ['shape-d4','inner-d4','shape-d6','inner-d6','shape-d8','inner-d8',
    'shape-d10','inner-d10','shape-d12','inner-d12','shape-d20','inner-d20',
    'shape-d100','inner-d100','shape-default'];

function activateDieShape(dieType) {
    ALL_SHAPES.forEach(id => { const e = document.getElementById(id); if(e) e.style.display='none'; });
    const cfg = DIE_CONFIG[dieType] || DIE_CONFIG.default;
    cfg.shapes.forEach(key => {
        const s = document.getElementById('shape-'+key);
        const i = document.getElementById(key);
        if(s) s.style.display = '';
        if(i && key.startsWith('inner-')) i.style.display = '';
    });
    return cfg;
}

function getPrimaryDie(expr) {
    const m = expr.match(/\d*d(\d+)/gi) || [];
    if (!m.length) return 'd6';
    const sides = m.map(s => parseInt(s.split('d')[1]));
    const key = 'd' + Math.max(...sides);
    return DIE_CONFIG[key] ? key : 'default';
}

// ── Helpers ────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function saveFolders() { localStorage.setItem('dice_folders', JSON.stringify(state.folders)); }

// ── Stars Canvas (Drifting ember sparks background) ─────────────────
function initStars() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let animationFrameId;
    let stars = [];
    
    function createStars() {
        stars = [];
        const count = 75;
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.4 + 0.3,
                alpha: Math.random() * 0.75 + 0.1,
                speed: Math.random() * 0.04 + 0.012,
                vx: (Math.random() - 0.5) * 0.16,
                vy: -Math.random() * 0.22 - 0.06
            });
        }
    }
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        createStars();
    }
    
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        stars.forEach(s => {
            s.y += s.vy;
            s.x += s.vx;
            
            // Re-spawn if off screen
            if (s.y < 0) {
                s.y = canvas.height;
                s.x = Math.random() * canvas.width;
            }
            if (s.x < 0 || s.x > canvas.width) {
                s.x = Math.random() * canvas.width;
            }
            
            // Twinkle
            s.alpha += s.speed;
            if (s.alpha > 0.85 || s.alpha < 0.08) {
                s.speed = -s.speed;
            }
            
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(212, 175, 55, ${s.alpha})`;
            ctx.fill();
        });
        
        animationFrameId = requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resize);
    resize();
    animate();
}

// ── Particles ──────────────────────────────────────────────
function spawnParticles(cx, cy, isCrit) {
    const colors = ['#e8bc60','#c9933a','#fffbe0','#d4a843','#ffffff'];
    const count = isCrit ? 36 : 16;
    for(let i=0;i<count;i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const sz  = isCrit ? 3+Math.random()*8 : 2+Math.random()*5;
        const ang = Math.random()*Math.PI*2;
        const spd = isCrit ? 90+Math.random()*180 : 50+Math.random()*100;
        const dur = 0.5+Math.random()*0.5;
        p.style.cssText = `left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            border-radius:${Math.random()>0.4?'50%':'2px'};transform:translate(-50%,-50%);
            transition:transform ${dur}s ease-out,opacity ${dur}s ease-out; z-index:999;`;
        el.particles.appendChild(p);
        requestAnimationFrame(() => {
            p.style.transform=`translate(calc(-50% + ${Math.cos(ang)*spd}px),calc(-50% + ${Math.sin(ang)*spd-(isCrit?110:60)}px))`;
            p.style.opacity='0';
        });
        setTimeout(()=>p.remove(),(dur+0.1)*1000);
    }
}

// ── Audio (Web Audio Synth) ─────────────────────────────────
function initAudio() {
    if(state.audioEnabled) return;
    state.audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    state.audioEnabled = true;
    el.permOverlay.style.display='none';
}

function playTick() {
    if(!state.audioCtx) return;
    const ctx=state.audioCtx;
    const now = ctx.currentTime;
    
    // 1. High frequency click (transient impact)
    const clickOsc = ctx.createOscillator();
    const clickGain = ctx.createGain();
    clickOsc.type = 'triangle';
    clickOsc.frequency.setValueAtTime(700 + Math.random()*500, now);
    clickGain.gain.setValueAtTime(0.08, now);
    clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.012);
    clickOsc.connect(clickGain);
    clickGain.connect(ctx.destination);
    clickOsc.start(now);
    clickOsc.stop(now + 0.015);
    
    // 2. Low-mid resonant body thud
    const resonantOsc = ctx.createOscillator();
    const resonantGain = ctx.createGain();
    resonantOsc.type = 'sine';
    resonantOsc.frequency.setValueAtTime(140 + Math.random()*100, now);
    resonantOsc.frequency.exponentialRampToValueAtTime(55, now + 0.07);
    resonantGain.gain.setValueAtTime(0.16, now);
    resonantGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    resonantOsc.connect(resonantGain);
    resonantGain.connect(ctx.destination);
    resonantOsc.start(now);
    resonantOsc.stop(now + 0.09);
}

function playShakeSound() {
    if(!state.audioCtx) return;
    const ctx=state.audioCtx, sz=ctx.sampleRate*0.12, buf=ctx.createBuffer(1,sz,ctx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<sz;i++) data[i]=Math.random()*2-1;
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const flt=ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=1800;
    const gain=ctx.createGain(); gain.gain.setValueAtTime(0.12,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
    noise.connect(flt); flt.connect(gain); gain.connect(ctx.destination); noise.start();
}

function playCrit() {
    if(!state.audioCtx) return;
    const ctx=state.audioCtx;
    // Harmonious major arpeggio chords
    const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // C Major arpeggio
    notes.forEach((f,i)=>{
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.type='sine';
        const t=ctx.currentTime+i*0.06;
        osc.frequency.setValueAtTime(f, t);
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.14,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t+0.4);
    });
}

function playFumble() {
    if(!state.audioCtx) return;
    const ctx=state.audioCtx;
    // Ominous deep drone
    const freqs = [78, 82, 120];
    freqs.forEach((f, i)=>{
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.type='sawtooth';
        osc.frequency.setValueAtTime(f, ctx.currentTime);
        
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(220, ctx.currentTime);
        filter.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.65);
        
        g.gain.setValueAtTime(0.18 - (i*0.03), ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
        
        osc.connect(filter);
        filter.connect(g);
        g.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.85);
    });
}

// ── Screen Flash / Shake Effect ─────────────────────────────
function triggerScreenFlash(type) {
    const overlay = document.getElementById('screen-effect-overlay') || document.createElement('div');
    overlay.id = 'screen-effect-overlay';
    document.body.appendChild(overlay);
    overlay.className = '';
    void overlay.offsetWidth; // force reflow
    overlay.classList.add(type === 'success' ? 'flash-success' : 'flash-fumble');
    
    document.body.classList.remove('shake-screen');
    void document.body.offsetWidth;
    document.body.classList.add('shake-screen');
    setTimeout(() => document.body.classList.remove('shake-screen'), 450);
}

// ── Parser (With Advantage / Disadvantage Support) ────────────
function parseExpression(expr) {
    return expr.split('|').map(g=>g.trim()).filter(Boolean).map(groupStr => {
        const result={original:groupStr,total:0,details:[]};
        const regex=/([+-]?\s*\d*d\d+)|([+-]?\s*\d+)/g; let m;
        while((m=regex.exec(groupStr))!==null){
            const part=m[0].replace(/\s+/g,'');
            if(part.includes('d')){
                let [cnt,sides]=part.split('d'); let sign=1;
                if(cnt.startsWith('+')) cnt=cnt.slice(1);
                else if(cnt.startsWith('-')){sign=-1;cnt=cnt.slice(1);}
                cnt=parseInt(cnt)||1; sides=parseInt(sides);
                const rolls=[];
                
                // If it is a d20 roll and advantage/disadvantage mode is active
                if(sides === 20 && (state.rollMode === 'adv' || state.rollMode === 'dis')) {
                    for(let i=0;i<cnt;i++){
                        const r1 = Math.floor(Math.random()*20)+1;
                        const r2 = Math.floor(Math.random()*20)+1;
                        let rSelected, rDiscarded;
                        
                        if(state.rollMode === 'adv') {
                            rSelected = Math.max(r1, r2);
                            rDiscarded = Math.min(r1, r2);
                        } else {
                            rSelected = Math.min(r1, r2);
                            rDiscarded = Math.max(r1, r2);
                        }
                        
                        rolls.push({val: rSelected, discarded: rDiscarded});
                        result.total += rSelected * sign;
                    }
                } else {
                    for(let i=0;i<cnt;i++){
                        const r=Math.floor(Math.random()*sides)+1;
                        rolls.push({val: r});
                        result.total+=r*sign;
                    }
                }
                result.details.push({type:'dice',expr:part,rolls,sides,sign});
            } else {
                const val=parseInt(part); if(!isNaN(val)){result.total+=val;result.details.push({type:'mod',val});}
            }
        }
        return result;
    });
}

// ── Render results ─────────────────────────────────────────
function renderResults(results) {
    el.resultContainer.innerHTML='';
    results.forEach((res,idx)=>{
        const div=document.createElement('div'); div.className='result-group';
        let label=results.length>1?`Grupo ${idx+1} &mdash; ${esc(res.original)}`:esc(res.original);
        if(state.rollLabel && idx === 0){
            label=`<span style="color:var(--gold-light); font-weight:700;">${esc(state.rollLabel)}</span> &mdash; ${label}`;
        }
        let chipsHTML='';
        res.details.forEach(d=>{
            if(d.type==='dice'){
                chipsHTML+='<div class="rolls-chips">';
                d.rolls.forEach(r=>{
                    const val = typeof r === 'object' ? r.val : r;
                    const discarded = typeof r === 'object' ? r.discarded : null;
                    
                    const cls=val===d.sides?'max':val===1?'min':'';
                    chipsHTML+=`<span class="roll-chip ${cls}">${val}</span>`;
                    
                    if (discarded !== null) {
                        const discCls=discarded===d.sides?'max':discarded===1?'min':'';
                        chipsHTML+=`<span class="roll-chip discarded ${discCls}">${discarded}</span>`;
                    }
                });
                chipsHTML+=`<span style="font-family:'Cinzel',serif;font-size:0.7rem;color:var(--muted);align-self:center;margin-left:2px;">${esc(d.expr)}</span></div>`;
            }
        });
        const mods=res.details.filter(d=>d.type==='mod');
        const modStr=mods.length?mods.map(d=>(d.val>=0?'+':'')+d.val).join(' '):'';
        div.innerHTML=`<div class="group-title">${label}</div><div class="group-total">${res.total}</div>${chipsHTML}${modStr?`<div class="group-details">Modificador: ${modStr}</div>`:''}`;
        el.resultContainer.appendChild(div);
    });
    el.resultContainer.classList.add('visible');
}

// ── Log ────────────────────────────────────────────────────
function addToLog(expression,results){
    state.history.unshift({time:new Date().toLocaleTimeString(),expression,label:state.rollLabel||'',results});
    if(state.history.length>50) state.history.pop();
    localStorage.setItem('dice_history',JSON.stringify(state.history));
    renderLog();
}
function renderLog(){
    el.logList.innerHTML=state.history.map(item=>`
        <div class="log-item">
            <div class="log-time">${esc(item.time)}</div>
            <div class="log-expr">${item.label?`<span style="color:var(--gold);font-weight:700;">${esc(item.label)}</span> &bull; `:''}${esc(item.expression)}</div>
            <div style="font-size:0.82rem;color:var(--parchment-dim)">
                ${item.results.map((r,i)=>(item.results.length>1?`G${i+1}: `:'')+`<strong style="color:var(--gold)">${r.total}</strong>`).join(' &nbsp;|&nbsp; ')}
            </div>
        </div>`).join('');
}

// ── Display (idle) ─────────────────────────────────────────
function updateDisplay(expr){
    el.exprDisplay.textContent=expr;
    if(el.rollLabel){
        if(state.rollLabel){
            el.rollLabel.textContent=state.rollLabel;
            el.rollLabel.style.display='block';
        } else {
            el.rollLabel.style.display='none';
        }
    }
    el.critLabel.classList.remove('show');
    el.dieWrapper.classList.remove('crit');
    el.dieWrapper.classList.remove('fumble');
    const dieType=getPrimaryDie(expr);
    const cfg=activateDieShape(dieType);
    el.dieNumber.setAttribute('y',cfg.numY);
    el.dieNumber.setAttribute('font-size',22);
    el.dieNumber.textContent=expr;
    el.dieLabel.setAttribute('y',cfg.labelY);
    el.dieLabel.textContent=dieType.toUpperCase();
}

// ── Adjust Expression (Quick modifiers) ───────────────────
function adjustExpression(mod) {
    let expr = state.expression.trim();
    if (mod === '+1' || mod === '-1') {
        const val = mod === '+1' ? 1 : -1;
        const groups = expr.split('|').map(g => g.trim());
        let lastGroup = groups[groups.length - 1];
        
        const match = lastGroup.match(/([+-]\s*\d+)$/);
        if (match) {
            const currentMod = parseInt(match[1].replace(/\s+/g, ''));
            const newVal = currentMod + val;
            const sign = newVal >= 0 ? '+' : '';
            lastGroup = lastGroup.substring(0, match.index) + (newVal !== 0 ? (sign + newVal) : '');
        } else {
            const sign = val >= 0 ? '+' : '';
            lastGroup = lastGroup + sign + val;
        }
        groups[groups.length - 1] = lastGroup;
        expr = groups.join(' | ');
    } else {
        expr = expr + ' ' + mod;
    }
    state.expression = expr;
    updateDisplay(expr);
}

// ── Roll ───────────────────────────────────────────────────
async function roll(){
    if(state.isRolling) return;
    state.isRolling=true; initAudio();
    el.resultContainer.classList.remove('visible');
    el.rollButton.disabled=true;
    el.critLabel.classList.remove('show');
    el.dieWrapper.classList.remove('crit');
    el.dieWrapper.classList.remove('fumble');
    const dieType=getPrimaryDie(state.expression);
    const cfg=activateDieShape(dieType);
    const sides=parseInt(dieType.replace('d',''))||20;
    el.dieNumber.setAttribute('y',cfg.numY); el.dieNumber.setAttribute('font-size',cfg.fs); el.dieNumber.textContent='?';
    el.dieLabel.setAttribute('y',cfg.labelY); el.dieLabel.textContent=dieType.toUpperCase();
    el.dieWrapper.classList.add('rolling'); el.dieSvg.classList.add('rolling');
    const start=Date.now();
    const interval=setInterval(()=>{
        if(Date.now()-start<900){ el.dieNumber.textContent=Math.floor(Math.random()*sides)+1; playTick(); }
        else { clearInterval(interval); finalize(); }
    },75);
    function finalize(){
        const results=parseExpression(state.expression);
        el.dieWrapper.classList.remove('rolling'); el.dieSvg.classList.remove('rolling');
        el.dieSvg.classList.add('settle'); setTimeout(()=>el.dieSvg.classList.remove('settle'),500);
        const displayVal=results.length===1?results[0].total:'✦';
        el.dieNumber.setAttribute('font-size',results.length===1?cfg.fs:40); el.dieNumber.textContent=displayVal;
        
        let isCrit=false;
        let isFumble=false;
        if(dieType==='d20'&&results.length===1){
            const d=results[0].details[0];
            if(d&&d.type==='dice'&&d.rolls.length===1){
                const mainRoll = d.rolls[0];
                const rolledVal = typeof mainRoll === 'object' ? mainRoll.val : mainRoll;
                if(rolledVal===20){
                    isCrit=true;
                    setTimeout(()=>{
                        el.dieWrapper.classList.add('crit');
                        el.critLabel.textContent = "⚔ CRÍTICO! ⚔";
                        el.critLabel.className = "crit-label show success";
                        playCrit();
                        triggerScreenFlash('success');
                    },80);
                } else if(rolledVal===1){
                    isFumble=true;
                    setTimeout(()=>{
                        el.dieWrapper.classList.add('fumble');
                        el.critLabel.textContent = "☠ FALHA CRÍTICA! ☠";
                        el.critLabel.className = "crit-label show fumble";
                        playFumble();
                        triggerScreenFlash('fumble');
                    },80);
                }
            }
        }
        
        const r=el.rollButton.getBoundingClientRect();
        spawnParticles(r.left+r.width/2, r.top+r.height/2, isCrit);
        renderResults(results); addToLog(state.expression,results);
        state.isRolling=false; el.rollButton.disabled=false;
    }
}

// ── Shake ──────────────────────────────────────────────────
let lastShake=0;
function handleMotion(event){
    let acc=event.acceleration, thr=8;
    if(!acc||acc.x===null){acc=event.accelerationIncludingGravity;thr=18;}
    if(!acc||acc.x===null) return;
    const mag=Math.sqrt(acc.x*acc.x+acc.y*acc.y+acc.z*acc.z), now=Date.now();
    if(mag>thr&&now-lastShake>1000){lastShake=now;playShakeSound();roll();}
}
async function requestShakePermission(){
    initAudio();
    if(navigator.permissions?.query){try{const s=await navigator.permissions.query({name:'accelerometer'});if(s.state==='denied'){alert('Permissão negada.');el.permOverlay.style.display='none';return;}}catch(e){}}
    if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
        try{const p=await DeviceMotionEvent.requestPermission();if(p==='granted')window.addEventListener('devicemotion',handleMotion);else alert('Permissão negada.');}catch(e){console.error(e);}
        el.permOverlay.style.display='none';
    } else {
        if(typeof DeviceMotionEvent!=='undefined') window.addEventListener('devicemotion',handleMotion);
        el.permOverlay.style.display='none';
    }
}

// =============================================================
//  FOLDERS / QUICK ROLLS
// =============================================================

function renderFolders(){
    if(!state.folders.length){
        el.foldersContainer.innerHTML='<p style="font-size:0.8rem;color:var(--muted);font-style:italic;text-align:center;padding:6px 0 2px;">Nenhuma pasta ainda. Clique + para criar.</p>';
        return;
    }
    el.foldersContainer.innerHTML=state.folders.map(folder=>`
        <div class="folder-card ${folder.open?'open':''}" data-folder-id="${esc(folder.id)}">
            <div class="folder-header" data-action="toggle" data-folder-id="${esc(folder.id)}">
                <button class="folder-chevron" data-action="toggle" data-folder-id="${esc(folder.id)}">▶</button>
                <span class="folder-name">${esc(folder.name)}</span>
                <button class="btn-folder-add" data-action="add-roll" data-folder-id="${esc(folder.id)}" title="Adicionar rolagem">+</button>
                <button class="btn-folder-del" data-action="del-folder" data-folder-id="${esc(folder.id)}" title="Excluir pasta">✕</button>
            </div>
            <div class="folder-body">
                <div class="folder-rolls">
                    ${folder.rolls.length===0
                        ? '<span class="folder-empty">Vazio — clique + para adicionar rolagens.</span>'
                        : folder.rolls.map(roll=>`
                            <div class="saved-roll-wrap">
                                <button class="saved-roll-btn color-${esc(roll.color || 'gold')}"
                                    data-action="exec-roll"
                                    data-folder-id="${esc(folder.id)}"
                                    data-roll-id="${esc(roll.id)}"
                                    data-expr="${esc(roll.expr)}"
                                    title="${esc(roll.expr)}">${esc(roll.name)}</button>
                                <button class="saved-roll-del"
                                    data-action="del-roll"
                                    data-folder-id="${esc(folder.id)}"
                                    data-roll-id="${esc(roll.id)}"
                                    title="Excluir">×</button>
                            </div>`).join('')
                    }
                </div>
            </div>
        </div>`).join('');
}

// Event delegation for folder container
el.foldersContainer.addEventListener('click', e => {
    const target = e.target.closest('[data-action]');
    if(!target) return;
    const action    = target.getAttribute('data-action');
    const folderId  = target.getAttribute('data-folder-id');
    const rollId    = target.getAttribute('data-roll-id');

    if(action==='toggle'){
        e.stopPropagation();
        const f=state.folders.find(f=>f.id===folderId);
        if(f){f.open=!f.open; saveFolders(); renderFolders();}
    }
    else if(action==='add-roll'){
        e.stopPropagation();
        state.activeFolderId=folderId;
        openNewRollModal();
    }
    else if(action==='del-folder'){
        e.stopPropagation();
        if(confirm('Excluir a pasta e todas as rolagens dentro dela?')){
            state.folders=state.folders.filter(f=>f.id!==folderId);
            saveFolders(); renderFolders();
        }
    }
    else if(action==='exec-roll'){
        const expr=target.getAttribute('data-expr');
        state.rollLabel=target.textContent.trim();
        state.expression=expr;
        updateDisplay(expr);
        roll();
    }
    else if(action==='del-roll'){
        e.stopPropagation();
        const f=state.folders.find(f=>f.id===folderId);
        if(f){f.rolls=f.rolls.filter(r=>r.id!==rollId); saveFolders(); renderFolders();}
    }
});

// New Roll modal
function openNewRollModal(){
    newRollExpr='';

    el.rollNameInput.value='';
    el.newRollExprDisp.value='';
    
    // Reset color picker active class
    document.querySelectorAll('.color-picker-btn').forEach(btn => {

    });

}

}
document.getElementById('btn-close-new-roll').addEventListener('click',()=>el.newRollModal.classList.remove('active'));
document.getElementById('btn-cancel-new-roll').addEventListener('click',()=>el.newRollModal.classList.remove('active'));
el.newRollModal.addEventListener('click',e=>{if(e.target===el.newRollModal)el.newRollModal.classList.remove('active');});

// Color picker interaction
document.querySelectorAll('.color-picker-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.color-picker-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRollColor = btn.getAttribute('data-color');
    });
});

// Calculator buttons inside new-roll modal
document.querySelectorAll('.new-roll-calc-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        newRollExpr = el.newRollExprDisp.value;
        const val=btn.getAttribute('data-val');
        if(val==='back'){ newRollExpr=newRollExpr.slice(0,-1); }
        else if(val==='clear'){ newRollExpr=''; }
        else {
            const last=newRollExpr.slice(-1);
            if(val.startsWith('d')&&(last===''||/[\+\-\|]/.test(last)))
                newRollExpr+='1'+val;
            else
                newRollExpr+=val;
        }
        updateNewRollExprDisplay();
        el.newRollExprDisp.focus();
    });
});

el.newRollExprDisp.addEventListener('input', () => { newRollExpr = el.newRollExprDisp.value; });

document.getElementById('btn-save-new-roll').addEventListener('click',()=>{
    const name=el.rollNameInput.value.trim();
    const expr=el.newRollExprDisp.value.trim();
    if(!name){ el.rollNameInput.focus(); return; }
    if(!expr){ el.newRollExprDisp.style.borderColor='rgba(200,50,50,0.6)'; setTimeout(()=>el.newRollExprDisp.style.borderColor='',1200); el.newRollExprDisp.focus(); return; }
    const f=state.folders.find(f=>f.id===state.activeFolderId);
    if(!f) return;
    f.rolls.push({id:genId(), name, expr, color: selectedRollColor});
    saveFolders(); renderFolders();
    el.newRollModal.classList.remove('active');
});

if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    el.permOverlay.style.display='block';
} else {
    el.permOverlay.style.display='block';
    if(typeof DeviceMotionEvent!=='undefined') window.addEventListener('devicemotion',handleMotion);
    else el.permOverlay.textContent=window.isSecureContext===false?'✦ Ativar Áudio (requer HTTPS) ✦':'✦ Ativar Áudio ✦';
