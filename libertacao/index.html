<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relacionamentos - Painel do Mestre</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="main-header">
  <div class="header-left">
    <h1>Relacionamentos</h1>
  </div>
  <div class="header-right">
    <div class="controls-main">
      <button id="clearAllData" class="btn-remove" style="width: auto; padding: 10px 20px;">Limpar Tudo</button> 
      <button id="saveData" class="btn-save">Salvar Progresso</button>
      <label for="loadData" class="btn-load">Carregar Progresso</label>
      <input type="file" id="loadData" accept=".json" style="display: none;">
    </div>
    <div class="header-actions">
      <a href="../index.html" class="header-btn" title="Arsenal do Mestre">🏠</a>
      <button id="theme-toggle" class="header-btn header-theme-btn" title="Alternar tema">☀️</button>
    </div>
  </div>
</header>

  <div class="main-container">
    <section id="npc-progress-section" class="card">
      <header>
        <h2>Progresso com NPCs</h2>
        <div class="player-form">
          <input type="text" id="playerName" placeholder="Nome do Jogador">
          <button id="addPlayer">Adicionar Jogador</button>
        </div>
        <button id="removePlayer" class="btn-remove">Remover Jogador Selecionado</button>
      </header>

      <div id="player-list"></div>


      



      <div id="npc-allies-board"
        style="margin-top: 30px; border-top: 2px solid var(--border-color); padding-top: 20px;">
        <h3>NPCs Aliados</h3>
        <div class="player-form">
          <input type="text" id="allyNpcName" placeholder="Nome do NPC Aliado">
          <button id="addAllyNpc">Adicionar Aliado</button>
        </div>
        <div id="ally-npc-list"
          style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px;">
        </div>
      </div>

      <div id="custom-missions-board"
        style="margin-top: 30px; border-top: 2px solid var(--border-color); padding-top: 20px;">
        <h3>Missões Customizáveis</h3>
        <div class="player-form" style="flex-wrap: wrap;">
          <input type="text" id="customMissionName" placeholder="Nome da Missão" style="flex: 1 1 100%;">
          <input type="text" id="customMissionDesc" placeholder="Descrição / Objetivo" style="flex: 2 1 200px;">
          <input type="text" id="customMissionReward" placeholder="Recompensa" style="flex: 1 1 150px;">
          <button id="addCustomMission">Adicionar Missão</button>
        </div>
        <div id="custom-mission-list"
          style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
        </div>
      </div>
    </section>

    <section id="missions-section" class="card">
      <header style="border-bottom: none; margin-top: 20px;">
        <div class="filter-container">
          <label for="filtroSolicitante">Filtrar por Solicitante:</label>
          <select id="filtroSolicitante">
            <option value="Todos">Todos</option>
          </select>
        </div>
        <h3>Estabelecimentos</h3>
      </header>

      <div class="player-form" style="flex-wrap: wrap; margin-bottom: 20px; gap: 8px;">
        <input type="text" id="newEstabName" placeholder="Nome do Estabelecimento" style="flex: 1 1 100%;">
        <input type="text" id="newEstabDesc" placeholder="Descrição" style="flex: 2 1 200px;">
        <input type="text" id="newEstabServices" placeholder="Serviços" style="flex: 1 1 150px;">
        <input type="text" id="newEstabHonors" placeholder="Honrarias" style="flex: 1 1 150px;">
        <button id="addEstab">Adicionar Estabelecimento</button>
      </div>

      <div id="solicitantes-container" class="solicitantes-grid"></div>


    </section>
  </div>

  <div id="npc-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div style="display:flex; gap:15px; align-items:start;">
        <div id="npc-modal-image" style="width:120px; height:120px; border-radius:8px; background-size:cover; background-position:center; background-color:#333; flex-shrink:0;"></div>
        <div style="flex:1;">
          <h4 id="npc-modal-name"></h4>
          <p><strong>Nível:</strong> <span id="npc-modal-nivel"></span></p>
          <p><strong>Jogador:</strong> <span id="npc-modal-player"></span></p>
          <p><strong>Corações:</strong> <span id="npc-modal-hearts"></span></p>
          <p><strong>Anotações:</strong> <span id="npc-modal-notes"></span></p>
        </div>
      </div>
      <button onclick="document.getElementById('npc-modal').style.display='none'" style="margin-top:15px;">Fechar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
